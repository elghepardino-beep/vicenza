<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="billing-app" class="hidden">
        <div class="container">
            <div class="header">
                <div>
                    <h1>💳 Gestione Fatture</h1>
                    <p class="subtitle">Visualizza, filtra e paga le tue fatture in sospeso</p>
                </div>
                <button class="close-btn" onclick="closeBilling()">✕</button>
            </div>

            <div class="stats">
                <div class="stat">
                    <label>Fatture in sospeso</label>
                    <div class="val" id="stat-count">0</div>
                </div>
                <div class="stat danger">
                    <label>Totale da pagare</label>
                    <div class="val" id="stat-total">$0</div>
                </div>
                <div class="stat">
                    <button class="btn-primary" onclick="payAll()">💰 Paga tutte</button>
                </div>
            </div>

            <div class="filters" id="filters"></div>

            <div class="bills-list" id="bills-list"></div>

            <div class="footer-info">Premi <kbd>ESC</kbd> per chiudere</div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
